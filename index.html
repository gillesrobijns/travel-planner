<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:oklch(97.5% 0.008 70); --surface:oklch(99.5% 0.003 70); --surface-2:oklch(97% 0.006 70);
  --border:oklch(90% 0.01 70); --text:oklch(23% 0.02 60); --text-2:oklch(50% 0.015 60); --text-3:oklch(68% 0.012 60);
  --accent:oklch(62% 0.15 55); --accent-d:oklch(50% 0.15 52); --accent-l:oklch(95% 0.045 72);
  --glacier:oklch(58% 0.07 215); --glacier-l:oklch(95% 0.03 215);
  --sb-bg:oklch(24% 0.03 220); --sb-sf:oklch(29% 0.028 220); --sb-text:oklch(93% 0.01 220);
  --sb-text-2:oklch(62% 0.02 220); --sb-border:oklch(33% 0.025 220);
  --sidebar:248px; --r:12px; --r-sm:8px; --r-lg:18px;
  --sh:0 1px 3px oklch(50% 0.005 75/.06),0 4px 16px -4px oklch(50% 0.005 75/.09);
  --sh-hov:0 16px 40px -10px oklch(40% 0.005 75/.14),0 4px 12px oklch(50% 0.005 75/.07);
}
html.dark{
  --bg:oklch(13% 0.012 225); --surface:oklch(18.5% 0.014 225); --surface-2:oklch(22% 0.013 225);
  --border:oklch(28% 0.015 225); --text:oklch(93% 0.006 80); --text-2:oklch(66% 0.012 80); --text-3:oklch(48% 0.01 80);
  --accent:oklch(72% 0.15 65); --accent-d:oklch(78% 0.14 68); --accent-l:oklch(30% 0.05 60);
  --glacier:oklch(72% 0.09 215); --glacier-l:oklch(28% 0.04 215);
  color-scheme:dark;
}
*{box-sizing:border-box}
html,body{height:100vh;overflow:hidden}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',system-ui,sans-serif;display:flex;-webkit-font-smoothing:antialiased}
a{color:var(--accent-d);text-decoration:none;border-bottom:1px solid color-mix(in oklch,var(--accent) 35%,transparent)}
a:hover{color:var(--accent)}
.num{font-family:'Barlow Condensed',sans-serif}

/* SIDEBAR */
#sidebar{width:var(--sidebar);position:fixed;left:0;top:0;height:100vh;z-index:100;background:var(--sb-bg);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;padding:18px 14px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:grid;place-items:center;flex:none;color:#2a1900;font-weight:800;font-family:'Barlow Condensed';font-size:19px}
.brand .bt{font-family:'Barlow Condensed';font-weight:700;letter-spacing:.04em;color:var(--sb-text);font-size:15px;line-height:1.05}
.brand .bs{font-size:10px;color:var(--sb-text-2);font-family:'Barlow Condensed';letter-spacing:.08em}
#sidebar nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
#sidebar nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--sb-text-2);font-size:14px;font-weight:500;cursor:pointer;border:0;transition:.18s}
#sidebar nav a svg{width:18px;height:18px;flex:none;stroke:currentColor;fill:none;stroke-width:1.7}
#sidebar nav a:hover{background:var(--sb-sf);color:var(--sb-text)}
#sidebar nav a.active{background:var(--accent);color:#2a1900;font-weight:600}
.sb-foot{margin-top:auto;padding:12px 10px 4px;border-top:1px solid var(--sb-border);color:var(--sb-text-2);font-size:11.5px;line-height:1.5;font-family:'Barlow Condensed';letter-spacing:.02em}
.sb-foot b{color:var(--sb-text);font-weight:600}

/* MAIN */
#main{margin-left:var(--sidebar);height:100vh;overflow:hidden;display:flex;flex-direction:column;flex:1;min-width:0}
#topbar{height:52px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:0 22px;gap:12px}
#tb-title{font-family:'Barlow Condensed';font-weight:700;font-size:20px;letter-spacing:.01em;line-height:1}
#tb-sub{font-size:12px;color:var(--text-2);margin-top:1px}
#tb-right{display:flex;align-items:center;gap:9px}
.tb-pill{font-family:'Barlow Condensed';font-weight:600;font-size:12.5px;padding:5px 11px;border-radius:100px;border:1px solid var(--border);color:var(--text-2);white-space:nowrap}
.tb-pill.green{background:var(--accent-l);color:var(--accent-d);border-color:transparent}
.tb-pill.cool{background:var(--glacier-l);color:var(--glacier);border-color:transparent}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);display:grid;place-items:center;cursor:pointer;flex:none}
.icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8}
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:24px 28px 60px;display:none}
.page.active{display:block}
.page.active>*{animation:tsEnter .45s cubic-bezier(0.16,1,0.3,1) both}
@keyframes tsEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* LAYOUT HELPERS */
.row{display:grid;gap:18px}
.r2{grid-template-columns:1fr 1fr}
.r3{grid-template-columns:1fr 1fr 1fr}
.span2{grid-column:span 2}
.mt{margin-top:18px}
.lead{color:var(--text-2);max-width:70ch;font-size:14px;margin:0 0 16px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.card.tint{border-top:2px solid var(--accent);background:linear-gradient(var(--accent-l),var(--surface) 60%)}
.card.cool{border-top:2px solid var(--glacier)}
.ch{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.ct{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em}
.card h3{font-family:'Barlow Condensed';font-weight:700;font-size:17px;margin:0 0 8px;letter-spacing:.01em}
.card h3 .tag{font-family:'Bricolage Grotesque';font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent-d);background:var(--accent-l);padding:2px 8px;border-radius:100px;margin-left:6px;white-space:nowrap}
.card p{margin:0 0 6px;font-size:13.5px;color:var(--text-2);line-height:1.55}
.card ul{margin:4px 0 0;padding-left:18px;font-size:13.5px;color:var(--text-2);line-height:1.6}
.card ul li{margin-bottom:5px}
.card ul li b{color:var(--text)}

/* STAT STRIP */
.stats6{display:grid;grid-template-columns:repeat(6,1fr);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh);overflow:hidden}
.stat6{padding:16px 14px;border-right:1px solid var(--border)}
.stat6:last-child{border-right:0}
.stat6 .v{font-family:'Barlow Condensed';font-weight:800;font-size:33px;line-height:1;letter-spacing:-.01em}
.stat6 .v.amber{color:var(--accent-d)} .stat6 .v.cool{color:var(--glacier)}
.stat6 .l{font-size:10.5px;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-top:5px;font-weight:600}

/* SPLIT BAR */
.splitbar{height:16px;border-radius:100px;overflow:hidden;display:flex;border:1px solid var(--border);margin:6px 0 10px}
.splitbar .s1{background:var(--glacier)} .splitbar .s2{background:var(--accent)}
.splitkey{display:flex;gap:18px;font-size:12.5px;color:var(--text-2)}
.splitkey b{font-family:'Barlow Condensed';font-size:18px;color:var(--text);font-weight:700;display:block}
.splitkey .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}

/* anchors list */
.anchors{display:flex;flex-direction:column;gap:0}
.anchor{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-top:1px solid var(--border)}
.anchor:first-child{border-top:0}
.anchor .when{font-family:'Barlow Condensed';font-weight:700;color:var(--accent-d);font-size:13.5px;min-width:96px;flex:none}
.anchor .what{font-size:13.5px;color:var(--text)}

/* MAP */
.mapwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.loopmap{width:100%;min-width:540px;height:auto;display:block;background:radial-gradient(120% 90% at 30% 0%,#0e2c33,#0B232A);border-radius:var(--r)}
.maplegend{display:flex;flex-wrap:wrap;gap:15px;font-family:'Barlow Condensed';font-size:12.5px;color:var(--text-2);margin-top:12px;letter-spacing:.02em}
.maplegend b{display:inline-flex;align-items:center;gap:7px;font-weight:500}
.mk{width:13px;height:13px;border-radius:50%;display:inline-block;flex:none}
.mk.camp{background:var(--accent)} .mk.scenic{background:transparent;border:2px solid var(--glacier)}
.mk.fer{width:18px;height:0;border-radius:0;border-top:2px dashed var(--glacier)}
.mk.ret{width:18px;height:0;border-radius:0;border-top:2px dashed var(--accent);opacity:.7}
/* real map + rail */
.maprow{display:flex;gap:16px}
.mapcol{flex:1;min-width:0}
#map{height:452px;border-radius:var(--r);z-index:0;border:1px solid var(--border)}
.leaflet-container{font-family:'Bricolage Grotesque',sans-serif;background:var(--surface-2)}
.leaflet-popup-content{margin:9px 12px;font-size:13px}
.leaflet-popup-content b{font-family:'Barlow Condensed';font-size:14px;letter-spacing:.01em}
.leaflet-popup-content .pday{color:var(--accent-d);font-family:'Barlow Condensed';font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase}
.leaflet-popup-content{min-width:180px;max-width:230px}
.leaflet-popup-content .pnote{display:block;font-size:11.5px;color:var(--text-2);line-height:1.4;margin-top:5px}
.railcol{width:288px;flex:none;display:flex;flex-direction:column}
.rail{overflow-y:auto;max-height:452px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface)}
.railrow{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-top:1px solid var(--border);cursor:pointer;transition:.14s}
.railrow:first-child{border-top:0}
.railrow:hover{background:var(--accent-l)}
.railrow.active{background:var(--accent-l);box-shadow:inset 3px 0 0 var(--accent)}
.rdot{width:9px;height:9px;border-radius:50%;flex:none;margin-top:4px}
.rdot.camp{background:var(--accent)} .rdot.scenic{background:transparent;border:2px solid var(--glacier)} .rdot.move{background:var(--text-3)}
.rday{font-family:'Barlow Condensed';font-weight:700;color:var(--accent-d);font-size:12.5px;min-width:26px;flex:none}
.rtxt{display:flex;flex-direction:column;min-width:0}
.rtitle{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.25}
.rsub{font-size:11px;color:var(--text-2);line-height:1.35;margin-top:2px}
@media(hover:hover){.card{transition:box-shadow .22s ease,transform .22s ease}.card:hover{box-shadow:var(--sh-hov);transform:translateY(-2px)}}
html.dark .leaflet-popup-content-wrapper,html.dark .leaflet-popup-tip{background:var(--surface);color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.5)}
html.dark .leaflet-container{background:#0e1418}
html.dark .leaflet-control-attribution{background:rgba(20,26,30,.75);color:#7d959c}
html.dark .leaflet-bar a{background:var(--surface);color:var(--text);border-color:var(--border)}
.lblshort{display:none}
button,a,.dhead,.railrow{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(max-width:820px){.maprow{flex-direction:column}.railcol{width:auto}#map{height:340px}.rail{max-height:230px}}

/* TIMELINE */
.tl-spine{position:relative;padding-left:24px}
.tl-spine::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:var(--border)}
.day{position:relative;margin-bottom:14px}
.day .dot{position:absolute;left:-24px;top:7px;width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--surface),0 0 0 4px var(--border)}
.day.scenic .dot{background:var(--glacier)} .day.move .dot{background:var(--text-3)}
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.dtop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:3px}
.dnum{font-family:'Barlow Condensed';font-weight:700;letter-spacing:.05em;color:var(--accent-d);font-size:13px}
.badge{font-family:'Barlow Condensed';font-weight:600;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:100px}
.badge.camp{background:var(--accent);color:#2a1900} .badge.scenic{border:1px solid var(--glacier);color:var(--glacier)} .badge.move{border:1px solid var(--border);color:var(--text-2)}
.dtitle{font-family:'Barlow Condensed';font-weight:700;font-size:18px;letter-spacing:.01em}
.leg{color:var(--text-2);font-size:12.5px;margin:1px 0 8px}
.tl .it{display:flex;gap:10px;font-size:13px;padding:5px 0;border-top:1px solid var(--border);color:var(--text-2)}
.tl .it .t{font-family:'Barlow Condensed';font-weight:600;color:var(--text-3);min-width:64px;flex:none}
.tl .it.fix .t{color:var(--accent-d)}
.tl .it .e{color:var(--text)}
.lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:var(--glacier);color:#06262e;padding:1px 6px;border-radius:5px;margin-right:6px}
.lbl.h{background:var(--accent);color:#2a1900}
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.stat{font-family:'Barlow Condensed';font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:1px 7px;color:var(--text-2)}
.stat.hard{color:#bd6a44} .stat.mod{color:#9a8638}
.dnote{margin-top:9px;font-size:12.5px;color:var(--text-2);background:var(--accent-l);border-radius:8px;padding:8px 11px;line-height:1.5}
.dnote b{color:var(--accent-d)}
.plan{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:9px 18px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--border)}
.pl{display:flex;flex-direction:column;gap:2px;min-width:0}
.pk{font-family:'Barlow Condensed';font-weight:700;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--glacier)}
.pv{font-size:12.5px;color:var(--text-2);line-height:1.38}
.pv b{color:var(--text);font-weight:600}
.pl.plwide{grid-column:1/-1;border-top:1px dashed var(--border);padding-top:9px;margin-top:1px}
.pv .src{display:block;margin-top:4px;font-size:10.5px;color:var(--text-3);font-style:italic}
.pv a{border-bottom-color:color-mix(in oklch,var(--accent) 25%,transparent)}
.dhead{cursor:pointer;position:relative;padding-right:24px}
.dchev{position:absolute;right:0;top:3px;font-family:'Barlow Condensed';font-weight:700;color:var(--text-3);font-size:15px;line-height:1;transition:transform .2s}
.dcard.collapsed .dchev{transform:rotate(-90deg)}
.dmeta{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:6px;font-family:'Barlow Condensed';font-size:12px;color:var(--text-2);letter-spacing:.01em}
.dmeta .m-fer{color:var(--glacier)}
.dmeta .m-snd{color:var(--text-3)}
.dbody{margin-top:12px}
.dcard.collapsed .dbody{display:none}
.dayctrl{display:flex;gap:8px;margin:0 0 12px}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
.tbl th{text-align:left;font-family:'Barlow Condensed';font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-2);padding:9px 12px;border-bottom:1px solid var(--border)}
.tbl th.num,.tbl td.tnum{text-align:right;white-space:nowrap}
.tbl td{padding:9px 12px;border-top:1px solid var(--border);color:var(--text-2)}
.tbl td.d{font-family:'Barlow Condensed';color:var(--accent-d);white-space:nowrap;font-weight:600}
.tbl td.lg{color:var(--text);font-weight:600}
.tbl td.tnum{font-family:'Barlow Condensed';color:var(--text)}
.tbl td.fer{color:var(--glacier);white-space:nowrap}
.scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* DAYLIGHT */
.daylight{display:flex;flex-wrap:wrap;gap:20px;align-items:center}
.daylight .big{font-family:'Barlow Condensed';font-weight:800;font-size:42px;color:var(--accent-d);line-height:1}
.dlbar{flex:1 1 240px;min-width:200px}
.dlbar .track{height:12px;border-radius:100px;background:linear-gradient(90deg,var(--accent-l),var(--accent) 18%,var(--accent) 88%,var(--glacier-l));border:1px solid var(--border)}
.dlbar .lab{display:flex;justify-content:space-between;gap:8px;font-family:'Barlow Condensed';font-size:11px;color:var(--text-2);margin-top:6px}

/* BUDGET */
.budgetsum{text-align:center}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:100px;padding:3px;gap:3px;margin-bottom:14px}
.seg button{font-family:'Barlow Condensed';font-weight:600;font-size:13px;letter-spacing:.03em;color:var(--text-2);background:none;border:0;padding:7px 15px;border-radius:100px;cursor:pointer;transition:.18s}
.seg button.on{background:var(--accent);color:#2a1900}
.bignum{font-family:'Barlow Condensed';font-weight:800;font-size:clamp(40px,8vw,58px);line-height:1;letter-spacing:-.01em}
.bignum .eur{display:block;font-size:18px;color:var(--glacier);margin-top:7px;font-weight:700}
.budgetsum .cap{font-family:'Barlow Condensed';font-size:12px;color:var(--text-2);margin-top:11px;letter-spacing:.03em}
.budget{width:100%;border-collapse:collapse;font-size:13.5px}
.budget th{text-align:left;font-family:'Barlow Condensed';font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-2);padding:7px 8px;border-bottom:1px solid var(--border)}
.budget th.num,.budget td.bn{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.budget td{padding:9px 8px;border-top:1px solid var(--border);color:var(--text)}
.budget td.bn{font-family:'Barlow Condensed';color:var(--text)}
.budget td.beur{color:var(--text-2)}
.budget tr.grp td{font-family:'Barlow Condensed';font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--accent-d);padding-top:15px;font-weight:600}
.budget tr.off{opacity:.4}
.budget label.chk{display:inline-flex;align-items:center;gap:9px;cursor:pointer}
.budget input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;flex:none}
.budget .sub{display:block;color:var(--text-3);font-size:11px}
.conv{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.conv .fld{flex:1 1 140px}
.conv label{font-family:'Barlow Condensed';font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-2);display:block;margin-bottom:5px}
.conv input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Barlow Condensed';font-weight:600;font-size:19px;padding:10px 12px}
.conv input:focus{outline:0;border-color:var(--accent)}
.conv .eq{font-family:'Barlow Condensed';color:var(--text-2);font-weight:700;font-size:20px;padding-bottom:8px}
.chart-box{position:relative;height:230px}
.note{font-size:12px;color:var(--text-3);margin-top:8px}

/* CHECKLIST */
.progress{height:10px;border-radius:100px;background:var(--surface-2);border:1px solid var(--border);overflow:hidden;margin:2px 0 4px}
.progress .fill{height:100%;background:var(--accent);width:0;transition:width .3s cubic-bezier(0.16,1,0.3,1)}
.checks{list-style:none;margin:6px 0 0;padding:0;font-size:13.5px}
.checks li{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-top:1px solid var(--border);color:var(--text)}
.checks li:first-child{border-top:0}
.checks input{accent-color:var(--accent);width:16px;height:16px;margin-top:2px;flex:none;cursor:pointer}
.checks li.done span{text-decoration:line-through;color:var(--text-3)}
.subh{font-family:'Barlow Condensed';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-d);margin:14px 0 2px}
.linkrow{font-size:12.5px;color:var(--text-2);margin-top:4px}
.btn{font-family:'Barlow Condensed';font-weight:600;font-size:12.5px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);border-radius:8px;padding:6px 12px;cursor:pointer}
.btn:hover{border-color:var(--accent);color:var(--accent-d)}
.quota{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.quota td{padding:7px 4px;border-top:1px solid var(--border)}
.quota td:first-child{font-family:'Barlow Condensed';font-weight:600;color:var(--accent-d);white-space:nowrap;padding-right:14px}
.sos{display:flex;gap:9px;flex-wrap:wrap;margin:2px 0 12px}
.sos div{flex:1 1 70px;text-align:center;border:1px solid var(--border);border-radius:11px;padding:11px 6px;background:var(--surface-2)}
.sos .n{font-family:'Barlow Condensed';font-weight:800;font-size:24px;color:#c4633e;line-height:1}
.sos .l{font-family:'Barlow Condensed';font-size:10px;letter-spacing:.05em;color:var(--text-2);text-transform:uppercase;margin-top:4px}

@media(max-width:900px){.r3{grid-template-columns:1fr}.r2{grid-template-columns:1fr}.span2{grid-column:auto}.stats6{grid-template-columns:repeat(3,1fr)}.stat6:nth-child(3n){border-right:0}}
@media(max-width:768px){
  html,body{height:auto;overflow:auto}
  /* bottom tab bar */
  #sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;width:auto;flex-direction:row;padding:6px 6px calc(6px + env(safe-area-inset-bottom));z-index:300;border-right:0;border-top:1px solid var(--sb-border);box-shadow:0 -8px 24px rgba(0,0,0,.28)}
  .brand,.sb-foot{display:none}
  #sidebar nav{flex-direction:row;width:100%;gap:2px;margin:0}
  #sidebar nav a{flex:1;flex-direction:column;justify-content:center;gap:3px;padding:7px 2px;min-height:52px;font-size:10px;font-weight:600;letter-spacing:.02em;text-align:center;border-radius:10px}
  #sidebar nav a svg{width:21px;height:21px}
  #sidebar nav a.active{background:transparent;color:var(--accent)}
  #sidebar nav a:has(.lblshort) .lbltxt{display:none}
  #sidebar nav a .lblshort{display:inline}
  /* content flows; clear the bottom bar */
  #main{margin-left:0;height:auto;overflow:visible}
  #topbar{position:sticky;top:0;z-index:250;padding:0 14px}
  #tb-title{font-size:17px}
  #tb-sub{display:none}
  .tb-pill{font-size:11px;padding:4px 9px}
  #pages{overflow:visible;position:static}
  .page{position:static;height:auto;overflow:visible;display:none;padding:14px 14px calc(86px + env(safe-area-inset-bottom))}
  .page.active{display:block}
  /* cards & stats */
  .row{gap:12px}.mt{margin-top:12px}
  .card{padding:14px 14px;border-radius:11px}
  .stats6{grid-template-columns:repeat(2,1fr)}
  .stat6{padding:12px 12px}
  .stat6 .v{font-size:26px}
  .stat6:nth-child(3n){border-right:1px solid var(--border)}
  .stat6:nth-child(2n){border-right:0}
  .stat6:nth-child(n+3){border-top:1px solid var(--border)}
  /* map + rail */
  #map{height:300px}
  .rail{max-height:250px}
  .railrow{min-height:46px;padding:9px 12px}
  /* charts */
  .chart-box{height:190px}
  /* day cards */
  .dayctrl .btn{padding:9px 14px;font-size:13px}
  .dhead{padding-right:26px}
  .dchev{font-size:17px;top:2px}
  .dtitle{font-size:17px}
  .dmeta{gap:4px 10px;font-size:11.5px}
  .tl .it{gap:8px;font-size:12.5px}
  .tl .it .t{min-width:56px}
  .plan{grid-template-columns:1fr;gap:8px}
  /* budget */
  .seg{display:flex;width:100%}
  .seg button{flex:1;padding:9px 6px}
  .budget{font-size:12.5px}
  .budget td{padding:8px 5px}
  .budget th{padding:6px 5px}
  .conv .eq{padding-bottom:10px}
  /* tables scroll hint */
  .scrollx{margin:0 -14px;padding:0 14px}
}</style>
</head>

</main>

ack to back — and fish the shoreline."}],"noteHTML":"\u003cb>Camping in nature:\u003c/b> vans park in the beach lot (first-come, sometimes restricted) — Uttakleiv's simple self-service pitch over the headland is the backup. Grill on the sand, not the grass.","hikeRef":"offersoykammen"},{"id":"D8","date":"2026-08-10","dnum":"DAY 08 · MON 10 AUG","dot":"","badge":"Campsite","badgeClass":"camp","title":"Kvalvika & Ryten → Beach Camp","meta":"~40 km · 1h","music":"Fleetwood Mac — Rumours","blocks":[{"time":"08:00","text":"At the Fredvang trailhead before the parking crunch."},{"time":"~08:30","hikeRef":"ryten","text":" for the iconic clifftop view down onto Kvalvika's wild beach, dropping to the sand before turning back (~4–5h)."},{"time":"~14:00","fix":true,"text":"Roll into \u003cb>Lofoten Beach Camp\u003c/b> on Skagsanden and claim your pitch now — it’s first-come and fills fast, so be in early, not at the 18:00 cut-off. Book your surf session at check-in."},{"time":"~15:30","label":"Surf","labelH":true,"text":"\u003cb>Surf Skagsanden\u003c/b> — board and wetsuit straight from the camp, right on the sand."},{"time":"evening","label":"Fish","text":"Sauna (to 22:00) and a sea dip, then dinner and a beer at the beach bar (to 23:00); cast off the beach in the late light."}],"noteHTML":"\u003cb>The spot Lisa flagged:\u003c/b> surf · sauna · beach bar on the sand — and a perfect base for tomorrow's Reinebringen.","hikeRef":"ryten"},{"id":"D9","date":"2026-08-11","dnum":"DAY 09 · TUE 11 AUG","dot":"","badge":"Campsite","badgeClass":"camp","title":"Reinebringen & Reine","meta":"~30 km · 40m","music":"Talk Talk — Spirit of Eden","blocks":[{"time":"07:30","hikeRef":"reinebringen","text":" before the stair traffic — the Sherpa staircase to the most photographed view in Lofoten (~2.5–3h)."},{"time":"~12:00","text":"Down by late morning; base at Moskenes Camping."},{"time":"afternoon","label":"Fish","text":"Drift through the villages at the end of the road — Reine, Hamnøy, Sakrisøy and Å — with deep water for fishing right beside the tarmac. (Optional guided kayak under the granite walls.)"}],"noteHTML":"\u003cb>Suggested stops:\u003c/b> \u003cb>Å\u003c/b> at the very end of the E10 — turf-roofed rorbuer, ~5 km on — is an easy stroll to fold into today. For more, the \u003cb>Reinefjord ferry\u003c/b> (park at Reine, no cars aboard) crosses to Vindstad for the easy ~1 h hike to \u003cb>Bunes beach\u003c/b>: a full day-trip on its own, or camp wild on the dunes overnight. Book the ferry ahead in summer.","hikeRef":"reinebringen"},{"id":"D10","date":"2026-08-12","dnum":"DAY 10 · WED 12 AUG","dot":"scenic","badge":"Long drive","badgeClass":"move","title":"The road home begins","meta":"~290 km · 4h30","music":"Daft Punk — Discovery","blocks":[{"time":"~09:00","text":"Depart east on the E10 — the long road home begins, so cue up the albums."},{"time":"en route","text":"Break it with a Svolvær viewpoint and a fjord stop or two."},{"time":"late aft.","label":"Fish","text":"Find a scenic, free pitch near Narvik or Bjerkvik for a last quiet night by the water — one final cast."}]},{"id":"D11","date":"2026-08-13","dnum":"DAY 11 · THU 13 AUG","dot":"","badge":"Campsite","badgeClass":"camp","title":"Back toward Tromsø","meta":"~250 km · 4h","music":"LCD Soundsystem — Sound of Silver","blocks":[{"time":"morning","text":"An easy drive north with the jagged Lyngen Alps across the fjord; a few coffee-and-photo stops."},{"time":"mid-aft.","text":"Pull into Tromsø Lodge &amp; Camping."},{"time":"eve","text":"Empty tanks, refuel and repack so the last morning is clean."}]},{"id":"D12","date":"2026-08-14","dnum":"DAY 12 · FRI 14 AUG","dot":"move","badge":"Return","badgeClass":"move","title":"Van back 10:00 · fly 15:00","meta":"depot → TOS · fly home","music":"Sigur Rós — Takk…","blocks":[{"time":"~08:30","text":"Empty the tanks, repack, and one last camp coffee."},{"time":"10:00","fix":true,"text":"Return the van at Arctic Campers, Kvaløysletta."},{"time":"~10:30","text":"Transfer to town/airport (depot → TOS ~25 min); a last harbour stroll if there’s time."},{"time":"15:00","fix":true,"text":"Fly TOS → Copenhagen → Brussels (SK 4453 / 0597), home 19:50."}],"noteHTML":"\u003cb>Comfortable:\u003c/b> the 10:00 drop leaves ~5 h before the flight."}],"stops":[{"key":"tromso","label":"Tromsø · start / end","type":"camp","lat":69.649,"lng":18.956,"note":"Land late; two easy nights in town — Fjellheisen and the harbour."},{"key":"senja","label":"Senja · N1","type":"camp","lat":69.545,"lng":17.55,"note":"Pick up the van, big shop, drive to Senja for a pier-side BBQ."},{"key":"gryllefjord","label":"Gryllefjord · N2","type":"scenic","lat":69.34,"lng":17.02,"note":"Climb Hesten for the Segla view, then stage by the ferry quay."},{"key":"bleik","label":"Andenes / Bleik · N3","type":"camp","lat":69.28,"lng":16.06,"note":"Morning ferry to Andøya; beach and mackerel fishing at Bleik."},{"key":"sortland","label":"Sortland · N4","type":"scenic","lat":68.696,"lng":15.41,"note":"Whale safari from Andenes, then a scenic Vesterålen night."},{"key":"svolvaer","label":"Svolvær · N5","type":"camp","lat":68.234,"lng":14.56,"note":"Ferry into Lofoten and hike Fløya & Djevelporten above town."},{"key":"gimsoy","label":"Gimsøy · N6","type":"scenic","lat":68.29,"lng":14.1,"note":"Early Festvågtinden, then galleries and coffee in Henningsvær."},{"key":"haukland","label":"Haukland · N7","type":"scenic","lat":68.14,"lng":13.63,"note":"A short summit, then the Haukland–Uttakleiv beach walk."},{"key":"beachcamp","label":"Beach Camp · N8","type":"camp","lat":68.08,"lng":13.4,"note":"Hike Ryten over Kvalvika, then surf and sauna at the beach camp."},{"key":"reine","label":"Reine · N9","type":"camp","lat":67.93,"lng":13.09,"note":"Dawn Reinebringen stairs, then potter around Reine and Å."},{"key":"aa","label":"Å i Lofoten · N9 side-trip","type":"scenic","lat":67.8796,"lng":12.984,"note":"Museum fishing village at the very end of the E10 — turf-roofed red rorbuer, ~5 km past Reine. Easy same-day stroll."},{"key":"reineferry","label":"Reinefjord ferry · from Reine","type":"scenic","lat":67.9327,"lng":13.088,"note":"MS Fjordkyss from Reine harbour to Kjerkfjord & Vindstad (~25 min). No cars aboard — park at Reine; book ahead in summer via Reis Nordland."},{"key":"bunes","label":"Bunes Beach · via Vindstad","type":"camp","lat":67.9762,"lng":13.085,"note":"White-sand beach under Helvetestinden — ferry to Vindstad, then an easy ~1 h hike over a low pass. Wild camp on the dunes behind the beach."},{"key":"narvik","label":"Narvik · N10","type":"scenic","lat":68.44,"lng":17.43,"note":"The big drive off the islands east to a fjord spot near Narvik."}],"hikes":[{"ref":"hesten","day":"D2","name":"Hesten","url":"https://www.alltrails.com/en-gb/trail/norway/troms-og-finnmark/topptur-til-hesten","distanceKm":5.5,"elevationM":538,"difficulty":"Hard","rating":4.8},{"ref":"floya","day":"D5","name":"Fløya & Djevelporten","url":"https://www.alltrails.com/en-gb/trail/norway/nordland/svolvaer-floya-djevelporten","distanceKm":4.2,"elevationM":534,"difficulty":"Hard","rating":4.8},{"ref":"festvagtinden","day":"D6","name":"Festvågtinden","url":"https://www.alltrails.com/en-gb/trail/norway/nordland/festvagtinden","distanceKm":2.7,"elevationM":500,"difficulty":"Hard","rating":4.6},{"ref":"offersoykammen","day":"D7","name":"Offersøykammen","url":"https://www.alltrails.com/en-gb/trail/norway/nordland/offersoykammen","distanceKm":3.7,"elevationM":454,"difficulty":"Moderate","rating":4.7},{"ref":"ryten","day":"D8","name":"Ryten","url":"https://www.alltrails.com/en-gb/trail/norway/nordland/innersand-ryten","distanceKm":7.6,"elevationM":597,"difficulty":"Hard","rating":4.8},{"ref":"reinebringen","day":"D9","name":"Reinebringen","url":"https://www.alltrails.com/en-gb/trail/norway/nordland/reinebringen","distanceKm":6,"elevationM":523,"difficulty":"Hard","rating":4.8}],"campsites":[{"day":"D1","name":"Camp Mefjord","url":"https://campmefjord.no","email":"firmapost@campmefjord.no","booking":"advance-online","note":"Only ~8 van pitches — book well ahead."},{"day":"D3","name":"Midnattsol Camping","url":"https://midnattsolcamping.com","email":"post@midnattsolcamping.com","booking":"advance-phone-email","note":"60 pitches; reserve ahead, ties to ferry-day arrival."},{"day":"D5","name":"Sandsletta Camping","url":"https://camping-lofoten.no","email":"sandsletta@camping-lofoten.com","booking":"advance-phone","note":"Recommend advance, esp. Jul–Aug."},{"day":"D8","name":"Lofoten Beach Camp","url":"https://lofotenbeachcamp.no","email":null,"booking":"first-come","note":"No pre-booking; arrive by ~14:00 (beats 18:00 crunch)."},{"day":"D9","name":"Moskenes Camping","url":"https://moskenescamping.no","phone":"+47 994 89 405","booking":"reserve-1-2-days","note":"Reservations only 1–2 days ahead; fills mid-afternoon."},{"day":"D11","name":"Tromsø Lodge & Camping","url":"https://tromsolodgeandcamping.no","email":"post@tromsocamping.no","booking":"advance-online","note":"Strongly recommend online booking; fills in summer."}],"ferries":[{"day":"D3","route":"Gryllefjord–Andenes","operator":"Torghatten Nord","season":"Summer only; peak Jun 13–Aug 17 = 3 sailings/day","departures":["~11:00","~15:00","~19:00"],"crossingMin":100,"booking":"No pre-booking — queue on the quay; campervans queue overnight","note":"Catch the ~11:00 (arrive Andenes ~12:40). Be in the 08:30 queue."},{"day":"D5","route":"Melbu–Fiskebøl","operator":"Torghatten Nord","season":"Year-round","frequency":"~15 sailings/day to ~21:30","crossingMin":25,"booking":"Pay on board","note":"Frequent; ~hourly holds comfortably."},{"day":"optional","route":"Moskenes–Værøy","operator":"Torghatten Nord","season":"Island route up to ~4/day in summer","booking":"Reservation recommended May–Sep","note":"Free for your vehicle if you disembark at Værøy. Værøy is a full day (Håheia hike). Exact per-date times: Torghatten live booking picker."}],"budget":{"default":{"totalNOK":75073,"totalEUR":6705,"assumes":"surf ON, kayak OFF"},"groups":[{"group":"Already booked","items":[{"nok":30123,"cat":"Camper","label":"Camper · all-in, paid (#TOS12792)","sub":"incl. Golden day, CV insurance, kit, service & toll fee","paid":true},{"nok":10640,"cat":"Flights","label":"Flights · Brussels ⇄ Tromsø × 2 (est.)","sub":"SAS via Oslo / Copenhagen · Standard, bags incl.","paid":true},{"nok":4200,"cat":"Stay","label":"Tromsø stay · 2 nights pre-camper (est.)","sub":"mid-range double · booked","paid":true}]},{"group":"Getting around","items":[{"nok":3100,"cat":"Transport","label":"Diesel · ~1,400 km @ ~21 kr/L"},{"nok":2300,"cat":"Transport","label":"Ferries · Gryllefjord–Andenes + Melbu–Fiskebøl"},{"nok":500,"cat":"Transport","label":"Airport transfer · depot → TOS (taxi)"}]},{"group":"Sleeping · 11 nights","items":[{"nok":2950,"cat":"Stay","label":"Campsites × 7","sub":"incl. Lofoten Beach Camp ~530 w/ power"},{"nok":560,"cat":"Stay","label":"Scenic-spot parking × 4"}]},{"group":"Activities · tick to include","items":[{"nok":3200,"cat":"Activities","label":"Whale safari, Andenes","toggle":true,"on":true},{"nok":1000,"cat":"Activities","label":"Puffin safari, Bleik","toggle":true,"on":true},{"nok":5000,"cat":"Activities","label":"Lofoten Links + club hire","toggle":true,"on":true},{"nok":1800,"cat":"Activities","label":"Surf · Lofoten Beach Camp","toggle":true,"on":true},{"nok":2200,"cat":"Activities","label":"Kayak, Reine","toggle":true,"on":false},{"nok":400,"cat":"Activities","label":"Trailhead parking (Ryten, etc.)"}]},{"group":"Food & drink","items":[{"nok":4500,"cat":"Food","label":"Groceries · self-catering + BBQ catch"},{"nok":1500,"cat":"Food","label":"Eating out · 1–2 meals","toggle":true,"on":true},{"nok":2300,"cat":"Food","label":"Beer · supermarket, 2+ pp/day","sub":"~40 kr/can vs 90–130 in a bar · wine from home"}]},{"group":"Other","items":[{"nok":1000,"cat":"Misc","label":"Showers, dump, laundry, sauna, data"}]}],"note":"\"Per day\" averages across 11 days; \"per person\" splits every line in two. Flights & Tromsø stay are estimates until you have the real figures."},"activities":[{"title":"Lofoten Links golf","tag":"Day 6 · Gimsøy","tint":false,"textHTML":"One of the world's great seaside links, right on your route. Early August still has light for a near-empty evening round; beach sauna &amp; the Hoven hike on site. \u003ca href=\"https://www.lofotenlinks.no/en/\" target=\"_blank\" rel=\"noopener\">lofotenlinks.no\u003c/a>","url":"https://www.lofotenlinks.no/en/","linkText":"lofotenlinks.no"},{"title":"Puffin safari, Bleiksøya","tag":"Day 3 · Bleik","tint":false,"textHTML":"90 min among ~80,000 puffin pairs with sea eagles overhead — it leaves from the harbour right by your campsite. Do it the afternoon you arrive. \u003ca href=\"https://www.puffinsafari.no/en\" target=\"_blank\" rel=\"noopener\">puffinsafari.no\u003c/a>","url":"https://www.puffinsafari.no/en","linkText":"puffinsafari.no"},{"title":"Arctic surf","tag":"Day 8 · Lofoten Beach Camp","tint":true,"textHTML":"The world's northernmost surf scene, right on Skagsanden where you're sleeping — boards, wetsuits, lessons and a warm-up sauna on site, no driving. Book the session at check-in. \u003ca href=\"https://www.lofotenbeachcamp.no/\" target=\"_blank\" rel=\"noopener\">lofotenbeachcamp.no\u003c/a>","url":"https://www.lofotenbeachcamp.no/","linkText":"lofotenbeachcamp.no"},{"title":"Kayak Reinefjorden","tag":"Day 9 · Reine","tint":false,"textHTML":"A ~3 h guided paddle under the granite walls, with a free sauna after — a perfect Reine afternoon. \u003ca href=\"https://reinepaddling.trekksoft.com/en\" target=\"_blank\" rel=\"noopener\">reinepaddling.no\u003c/a>","url":"https://reinepaddling.trekksoft.com/en","linkText":"reinepaddling.no"}],"prep":{"fromHome":["\u003cb>Your nice wine\u003c/b> — same tax-free cap whether bought here or at the airport, so bring the bottles you want: up to \u003cb>4 each (8 total)\u003c/b> if you skip spirits. Pad them in the checked bags.","Good coffee &amp; BBQ spices/marinades — dear up north.","Charcuterie + a hard cheese for the first nights (up to 10 kg meat/cheese pp from the EEA).","Endurance snacks, bars &amp; gels.","You each have \u003cb>23 kg checked\u003c/b> — room for a soft cooler bag."],"inNorway":["\u003cb>Bring vs buy:\u003c/b> groceries run ~25% above home (meat &amp; dairy worst, fish barely) — so bring cured meat, hard cheese, coffee &amp; BBQ spices; buy fresh &amp; bulky (produce, bread, beer) locally and catch the fish.","Big shop in \u003cb>Tromsø on Monday\u003c/b> (Day 1) — Sunday shops shut. Then Sortland, Leknes, Svolvær.","Beer top-up at supermarkets (~40 kr/can vs 90–130 in a bar); sales stop ~20:00 weekdays, ~18:00 Sat, none Sun.","Wine/spirits beyond quota: \u003cb>Vinmonopolet\u003c/b> only (closed Sundays).","Fresh produce, bread, dairy — and the fish you catch."],"checklist":[{"heading":"On the body","items":["Layers + a proper hardshell","Sturdy hiking boots","Swimwear + quick-dry towel (sauna)","Eye mask — no true darkness","Midge repellent (mygg)"]},{"heading":"Kit","items":["Pliers, knife, unhooking mat","Power bank + 12V chargers","Offline maps: Norgeskart / ut.no / park4night","Reusable bottles (tap water's superb)","CEE hook-up cable + adapter"]},{"heading":"Fishing","items":["Travel rod — Caperlan WXM-500 Travel 2.40 m (4-section, packs for flying)","Reel 3000–4000 + 20–30 lb braid","Mackerel feathers + a few 40–60 g pilks"]},{"heading":"Documents","items":["Driving licence + van contract","EU health card (EHIC)","Card — decline \"pay in EUR\" (DCC)","Travel insurance doc"]}],"goodToKnow":["No northern lights yet — too bright in early Aug.","Midnight sun just ended; days are ~endless.","Empty tanks on campsite nights (tømmestasjon).","The van's tall — watch height-barrier car parks.","Treat hike days as swappable around the weather.","Mobile data: Norway's in EU \"roam like at home\" — your plan works at home rates."],"dutyFreeHTML":"\u003cdiv class=\"card tint mt\">\u003ch3>The play · duty-free quota\u003c/h3>\n        \u003cp>Bring your own wine from home (up to 4 bottles each if you skip spirits), top up beer at Oslo's arrivals tax-free. At ~2 glasses each a night, 8 bottles lasts ~10 nights, then switch to beer. Buy everything fresh and bulky locally; run the BBQ on free, fresh-caught fish.\u003c/p>\n        \u003ctable class=\"quota\">\n          \u003ctr>\u003ctd>Standard mix\u003c/td>\u003ctd>1 L spirits + 1.5 L wine (2 btl) + 2 L beer · per person\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>Skip spirits\u003c/td>\u003ctd>→ 3 L wine (4 btl) + 2 L beer\u003c/td>\u003c/tr>\n          \u003ctr>\u003ctd>Beer only\u003c/td>\u003ctd>→ 5 L beer (15 × 0.33)\u003c/td>\u003c/tr>\n        \u003c/table>\n        \u003cp class=\"note\">Trade \"down\" only (spirits → wine/beer), never up. You can bring more but must declare it and pay Norwegian duty (steep). Plus NOK 6,000 of other goods each.\u003c/p>\n      \u003c/div>","homeTitleHTML":"From home \u003cspan class=\"tag\">light &amp; high-value\u003c/span>","localTitleHTML":"In Norway \u003cspan class=\"tag\" style=\"color:var(--glacier);background:var(--glacier-l)\">fresh &amp; heavy\u003c/span>"},"driving":{"fuel":["Reliable diesel in the towns: \u003cb>Tromsø, Finnsnes, Andenes, Sortland, Svolvær, Leknes\u003c/b>.","Thin stretches: \u003cb>Senja's interior\u003c/b>, the far SW (\u003cb>Reine → Å\u003c/b>), and the long return.","Many northern pumps are \u003cb>unmanned\u003c/b> (card only) and close evenings/Sundays — keep the tank above half.","~21 kr/L; ~10–11 L/100 km → ~3,000 kr for the loop. Check \u003cb>AdBlue\u003c/b>."],"rainDay":["\u003cb>Senja:\u003c/b> Tungeneset &amp; Bergsbotn viewpoints from the van; Ånderdalen boardwalks.","\u003cb>Andøya:\u003c/b> whale safari sails in rain; Andøya Space; Hurtigruten Museum.","\u003cb>Lofoten:\u003c/b> Lofotr Viking Museum, the Aquarium at Kabelvåg, Vikten glassblowing, a sauna day.","\u003cb>Anytime:\u003c/b> swap a summit for the Haukland–Uttakleiv coast path."],"emergency":[{"n":"112","l":"Police"},{"n":"113","l":"Medical"},{"n":"110","l":"Fire"}],"breakdown":"Save the 24/7 Arctic Campers number day 1; recovery via Viking / NAF.","essentials":["\u003cb>Breakdown:\u003c/b> save the 24/7 Arctic Campers number day 1; recovery via Viking / NAF.","\u003cb>Road &amp; weather:\u003c/b> \u003ca href=\"https://www.vegvesen.no/en/traffic/\" target=\"_blank\" rel=\"noopener\">vegvesen.no\u003c/a> (or 175); \u003ca href=\"https://www.yr.no/en\" target=\"_blank\" rel=\"noopener\">yr.no\u003c/a>.","\u003cb>Hospitals:\u003c/b> UNN Tromsø, Harstad, Stokmarknes, Gravdal/Leknes. Bring your EU card.","\u003cb>Mountains:\u003c/b> tell someone your plan; turn back in bad weather. On a trail, dial 112."],"lead":"Keeping fuel in the tank, a plan for the wet days, and the numbers you hope you never need."},"credits":{"coffeeGuide":"@helenemoo’s Lofoten guide"},"pageSubtitles":{"overview":"Tromsø → Lofoten · 1–14 Aug 2026","route":"13 nights · ~1,400 km loop","budget":"Live estimate · €1 ≈ 11.2 NOK","do":"Activities · fishing","prep":"Provision · packing","road":"Fuel · weather · emergency"},"overview":{"mapTitle":"The loop","mapSub":"Tromsø → Senja → Vesterålen → Lofoten","fallbackMapSVG":"\u003csvg class=\"loopmap\" viewBox=\"0 0 800 520\" role=\"img\" aria-label=\"Map of the Tromsø to Lofoten camper loop\">\n              \u003cg fill=\"none\">\n                \u003cpath d=\"M30,476 C200,440 360,500 540,448 690,406 760,448 800,430\" stroke=\"#163840\" stroke-width=\"1\"/>\n                \u003cpath d=\"M10,330 C160,292 320,356 470,306 630,256 730,300 800,272\" stroke=\"#143138\" stroke-width=\"1\"/>\n                \u003cpath d=\"M40,190 C180,160 320,210 470,176 620,146 720,180 800,158\" stroke=\"#122d34\" stroke-width=\"1\"/>\n              \u003c/g>\n              \u003cpolyline points=\"72,449 566,333 740,60\" fill=\"none\" stroke=\"#F0A93C\" stroke-width=\"2\" stroke-dasha 3c/div>","plans":[[["Sleep","\u003cb>Tromsø hotel\u003c/b> · 2 nights (booked)"],["Shop","Sun shops shut — essentials only; big shop after pickup"],["Book","Hotel done — nothing else to reserve"]],[["Sleep","\u003ca href=\"https://campmefjord.no\" target=\"_blank\" rel=\"noopener\">\u003cb>Camp Mefjord\u003c/b>\u003c/a>, Mefjordvær · ~kr 350–450"],["Fuel · shop","Big grocery shop in Tromsø; diesel at Finnsnes"],["BBQ","Barbecue hut + outdoor kitchen on site ✓"],["Book","Book Camp Mefjord online now — only ~8 van pitches, so reserve well ahead"]],[["Sleep","Scenic spot near Gryllefjord quay · \u003cb>free\u003c/b>"],["Fuel · shop","Last shop at Finnsnes/Senja; fill diesel"],["BBQ","Bring-your-own — grill on the quay/rock, clear of trees"],["Book","Park near the quay for tomorrow’s ferry queue"]],[["Sleep","\u003ca href=\"https://midnattsolcamping.com\" target=\"_blank\" rel=\"noopener\">\u003cb>Midnattsol Camping\u003c/b>\u003c/a>, Bleik · ~kr 400"],["Fuel · shop","Diesel + groceries in Andenes on arrival"],["BBQ","Barbecue grills + shared kitchen on site ✓"],["Book · queue","Reserve Midnattsol ahead (phone/email) · Ferry pay-on-board ~kr 1,985 (6–8 m) · be in the 08:30 queue for 11:00 · puffin ~kr 500 pp"]],[["Sleep","Scenic spot near Sortland · \u003cb>free\u003c/b>"],["Fuel · shop","Resupply + diesel in Sortland"],["BBQ","Bring-your-own — gas or grill on gravel/shore"],["Book","Whale safari ~kr 1,690 pp — reserve the AM slot, arrive 45–60 min early"]],[["Sleep","\u003ca href=\"https://camping-lofoten.no\" target=\"_blank\" rel=\"noopener\">\u003cb>Sandsletta Camping\u003c/b>\u003c/a> · ~kr 400"],["Fuel · shop","Diesel/shop in Sortland or Svolvær"],["BBQ","Grill area + restaurant on site ✓"],["Book","Reserve Sandsletta ahead by phone (esp. Jul–Aug high season) · Melbu–Fiskebøl ferry pay on board, ~hourly"],["Coffee &amp; extras","Cinnamon buns at \u003ca href=\"https://www.google.com/maps?q=Kringla+Svolv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Kringla\u003c/a> or \u003ca href=\"https://www.google.com/maps?q=Duus+Matverk+Svolv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Duus Matverk\u003c/a> (Svolvær), coffee at \u003ca href=\"https://www.google.com/maps?q=Brent+kaffebar+Svolv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Brent\u003c/a>. Right by your Sandsletta stop in Laukvik: \u003ca href=\"https://www.google.com/maps?q=Kafe+Naust+Laukvik+Lofoten\" target=\"_blank\" rel=\"noopener\">Kafé Naust\u003c/a>, with the \u003ca href=\"https://www.google.com/maps?q=Keans+Beans+Laukvik+Lofoten\" target=\"_blank\" rel=\"noopener\">Keans Beans\u003c/a> coffee distillery next door, plus \u003ca href=\"https://www.google.com/maps?q=Livland+G%C3%A5rd+Laukvik\" target=\"_blank\" rel=\"noopener\">Livland Gård\u003c/a> for homemade ice cream. Boat day → a silent electric \u003ca href=\"https://www.google.com/maps?q=Trollfjorden+Lofoten\" target=\"_blank\" rel=\"noopener\">Trollfjord\u003c/a> cruise or an eagle/orca RIB (\u003ca href=\"https://www.google.com/maps?q=Brim+Explorer+Svolv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Brim Explorer\u003c/a> · \u003ca href=\"https://www.google.com/maps?q=XX+Lofoten+Svolv%C3%A6r\" target=\"_blank\" rel=\"noopener\">XX Lofoten\u003c/a>), or the ferry over to \u003ca href=\"https://www.google.com/maps?q=Skrova+Lofoten\" target=\"_blank\" rel=\"noopener\">Skrova\u003c/a> island.\u003cspan class=\"src\">— from @helenemoo’s Lofoten guide\u003c/span>"]],[["Sleep","Scenic spot near Gimsøy/Henningsvær · \u003cb>free\u003c/b>"],["Fuel · shop","Top up in Svolvær; small shops in Henningsvær"],["BBQ","Bring-your-own — beach/rock by the sea"],["Book","Optional Lofoten Links ~kr 1,950–2,200 — call ahead for an evening tee"],["Coffee &amp; extras","\u003ca href=\"https://www.google.com/maps?q=Trevarefabrikken+Henningsv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Trevarefabrikken\u003c/a> in Henningsvær — hip café with weekend brunch and pizza, and a sauna with a big ocean-view window; grab a bun at \u003ca href=\"https://www.google.com/maps?q=Lysst%C3%B8periet+Henningsv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Lysstøperiet\u003c/a>. On the water, a RIB out with \u003ca href=\"https://www.google.com/maps?q=Lofoten+Opplevelser+Henningsv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Lofoten Opplevelser\u003c/a> hunting sea eagles and orcas. On Gimsøy, \u003ca href=\"https://www.google.com/maps?q=Hov+G%C3%A5rd+Gims%C3%B8y+Lofoten\" target=\"_blank\" rel=\"noopener\">Hov Gård\u003c/a>’s barrel sauna sits right on the beach — and climbers can take on \u003ca href=\"https://www.google.com/maps?q=Svolv%C3%A6rgeita+Henningsv%C3%A6r\" target=\"_blank\" rel=\"noopener\">Svolværgeita\u003c/a> with a Henningsvær guide.\u003cspan class=\"src\">— from @helenemoo’s Lofoten guide\u003c/span>"]],[["Sleep","Wild camp · \u003cb>Haukland beach car park\u003c/b> · ~kr 0–200"],["Fuel · shop","Big shop in Leknes before the beach"],["BBQ","Grill on the sand at Haukland, clear of the grass"],["Book · note","First-come; overnighting in the lot can be restricted — Uttakleiv’s basic self-service pitch is the backup"],["Coffee &amp; extras","\u003ca href=\"https://www.google.com/maps?q=Lofoten+bakeri+Leknes\" target=\"_blank\" rel=\"noopener\">Lofoten bakeri\u003c/a> in Leknes on the shop run. Worth the detour to \u003ca href=\"https://www.google.com/maps?q=Unstad+Lofoten\" target=\"_blank\" rel=\"noopener\">Unstad\u003c/a>: the guide crowns \u003ca href=\"https://www.google.com/maps?q=Unstad+Arctic+Surf\" target=\"_blank\" rel=\"noopener\">Arctic Surf\u003c/a>’s cinnamon bun the best in Lofoten (huge — share one), right by the famous surf beach; on the way, \u003ca href=\"https://www.google.com/maps?q=Lofoten+G%C3%A5rdsysteri+Saupstad+Lofoten\" target=\"_blank\" rel=\"noopener\">Lofoten Gårdsysteri\u003c/a> farm shop for its own cheese, and the easy coastal walk or viewpoint at \u003ca href=\"https://www.google.com/maps?q=Eggum+Lofoten\" target=\"_blank\" rel=\"noopener\">Eggum\u003c/a>.\u003cspan class=\"src\">— from @helenemoo’s Lofoten guide\u003c/span>"]],[["Sleep","\u003ca href=\"https://lofotenbeachcamp.no\" target=\"_blank\" rel=\"noopener\">\u003cb>Lofoten Beach Camp\u003c/b>\u003c/a>, Skagsanden · ~kr 480 + 50 power"],["Fuel · shop","Stock up in Leknes before Flakstad"],["BBQ","Beach bar on site; grill on Skagsanden sand"],["Book · timing","No camper booking — claim pitch by ~14:00 (fills fast); book surf at check-in"],["Coffee &amp; extras","\u003ca href=\"https://www.google.com/maps?q=Glasshytta+Vikten+Lofoten\" target=\"_blank\" rel=\"noopener\">Glasshytta\u003c/a> at \u003ca href=\"https://www.google.com/maps?q=Vikten+Lofoten\" target=\"_blank\" rel=\"noopener\">Vikten\u003c/a> — watch glass being blown and grab a cinnamon bun; \u003ca href=\"https://www.google.com/maps?q=Ramberg+Lofoten\" target=\"_blank\" rel=\"noopener\">Ramberg\u003c/a>’s wide beach and its roadside viewpoint are close by. Detour south to \u003ca href=\"https://www.google.com/maps?q=Nusfjord+Lofoten\" target=\"_blank\" rel=\"noopener\">Nusfjord\u003c/a>, one of Norway’s best-preserved fishing villages, with \u003ca href=\"https://www.google.com/maps?q=Hansines+bakeri+Nusfjord\" target=\"_blank\" rel=\"noopener\">Hansines bakeri\u003c/a> and the \u003ca href=\"https://www.google.com/maps?q=Landhandleriet+Nusfjord\" target=\"_blank\" rel=\"noopener\">Landhandleriet\u003c/a> café.\u003cspan class=\"src\">— from @helenemoo’s Lofoten guide\u003c/span>"]],[["Sleep","\u003ca href=\"https://moskenescamping.no\" target=\"_blank\" rel=\"noopener\">\u003cb>Moskenes Camping\u003c/b>\u003c/a> · ~kr 400"],["Fuel · shop","Fuel/shop in Leknes earlier (limited out west); small shop in Reine"],["BBQ","Covered BBQ huts + guest kitchen on site ✓"],["Book","Call Moskenes ~2 days ahead to reserve (fills mid-afternoon) · optional kayak ~kr 2,200 · Reinebringen 07:30 for parking"],["Coffee &amp; extras","\u003ca href=\"https://www.google.com/maps?q=%C3%85+bakeri+Lofoten\" target=\"_blank\" rel=\"noopene function initDarkIcons(){
  try{ if(localStorage.getItem('acl_dark')==='1') document.documentElement.classList.add('dark'); }catch(e){}
  var d=document.documentElement.classList.contains('dark');
  var m=document.querySelector('.icon-moon'),s=document.querySelector('.icon-sun');
  if(m&&s){m.style.display=d?'none':'';s.style.display=d?'':'none';}
  setThemeColor();
}
function toggleDark(){
  var dark=document.documentElement.classList.toggle('dark');
  try{localStorage.setItem('acl_dark',dark?'1':'0');}catch(e){}
  document.querySelector('.icon-moon').style.display=dark?'none':'';
  document.querySelector('.icon-sun').style.display=dark?'':'none';
  refreshCharts(); updateMapTheme(); setThemeColor();
}

/* ---- BUDGET ---- */
var bdiv=1, catSums={}, budgetChart=null;
function recalc(){
  var rows=document.querySelectorAll('#budgetTable tr.line');
  var total=0,paid=0; catSums={}; CATS.forEach(function(c){catSums[c]=0;});
  rows.forEach(function(r){
    var nok=+r.getAttribute('data-nok');
    var cb=r.querySelector('input[type=checkbox]'); var inc=!cb||cb.checked;
    r.classList.toggle('off',!inc);
    var nc=r.querySelector('.bn'), ec=r.querySelector('.beur');
    if(inc){
      total+=nok; if(r.getAttribute('data-paid'))paid+=nok;
      catSums[r.getAttribute('data-cat')]+=nok;
      nc.textContent='kr '+fmt(nok/bdiv); ec.textContent='€'+fmt(nok/bdiv/RATE);
    } else { nc.textContent='—'; ec.textContent=''; }
  });
  var caps={1:'for the two of you, whole trip',2:'per person, whole trip',11:'per day · for two, over 11 days'};
  document.getElementById('bigNok').textContent='kr '+fmt(total/bdiv);
  document.getElementById('bigEur').textContent='≈ €'+fmt(total/bdiv/RATE);
  document.getElementById('bigCap').textContent=caps[bdiv];
  var k=document.getElementById('kpi-cost'); if(k)k.textContent='€'+fmt(total/RATE);
  window._bTotEur='€'+fmt(total/RATE);
  var p2=document.getElementById('tb-pill2'); if(p2){p2.textContent='€'+fmt(total/RATE)+' · for two';p2.style.display='';}
  var spend=total-paid, pp=Math.round(paid/total*100);
  var sp=document.getElementById('splitPaid'), ss=document.getElementById('splitSpend');
  if(sp){sp.style.width=pp+'%';ss.style.width=(100-pp)+'%';}
  var pe=document.getElementById('paidEur'), se=document.getElementById('spendEur');
  if(pe)pe.textContent='€'+fmt(paid/RATE); if(se)se.textContent='€'+fmt(spend/RATE);
  if(budgetChart){ budgetChart.data.datasets[0].data=CATS.map(function(c){return catSums[c];}); budgetChart.update(); }
}
function initBudget(){
  var seg=document.getElementById('seg');
  if(seg)seg.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    bdiv=+b.getAttribute('data-div');
    this.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);});
    recalc();
  });
  document.querySelectorAll('#budgetTable input[type=checkbox]').forEach(function(c){c.addEventListener('change',recalc);});
  var nok=document.getElementById('cNok'),eur=document.getElementById('cEur');
  function r2(n){return Math.round(n*100)/100;}
  if(nok&&eur){
    nok.addEventListener('input',function(){var v=parseFloat(nok.value);eur.value=isNaN(v)?'':r2(v/RATE);});
    eur.addEventListener('input',function(){var v=parseFloat(eur.value);nok.value=isNaN(v)?'':r2(v*RATE);});
  }
}

/* ---- CHARTS ---- */
function axisColor(){return getComputedStyle(document.documentElement).getPropertyValue('--text-2');}
function gridColor(){return document.documentElement.classList.contains('dark')?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';}
var driveChart=null,hikeChart=null;
function renderRouteCharts(){
  if(typeof Chart==='undefined')return;
  var c=TRIP.charts||{drive:{},hike:{}};
  if(!driveChart){
    driveChart=new Chart(document.getElementById('ch-drive'),{
      type:'bar',
      data:{labels:c.drive.labels||[],datasets:[{data:c.drive.data||[],backgroundColor:'#E0922E',borderRadius:5,maxBarThickness:26}]},
      options:chartOpts('h')
    });
  }
  if(!hikeChart){
    hikeChart=new Chart(document.getElementById('ch-hike'),{
      type:'bar',
      data:{labels:c.hike.labels||[],datasets:[{data:c.hike.data||[],backgroundColor:'#5BA3AD',borderRadius:5,maxBarThickness:30}]},
      options:chartOpts('m')
    });
  }
}
function chartOpts(unit){
  return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
    tooltip:{callbacks:{label:function(c){return c.parsed.y+(unit==='h'?' h':' m');}}}},
    scales:{x:{grid:{display:false},ticks:{color:axisColor(),font:{size:11}}},
      y:{grid:{color:gridColor()},ticks:{color:axisColor(),font:{size:11}},beginAtZero:true}}};
}
var donutCenter={id:'donutCenter',afterDraw:function(c){var m=c.getDatasetMeta(0);if(!m||!m.data||!m.data[0])return;var x=m.data[0].x,y=m.data[0].y,ctx=c.ctx;var cs=getComputedStyle(document.documentElement);ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';ctx.font="700 21px 'Barlow Condensed',sans-serif";ctx.fillStyle=cs.getPropertyValue('--text');ctx.fillText(window._bTotEur||'',x,y-8);ctx.font="600 10.5px 'Barlow Condensed',sans-serif";ctx.fillStyle=cs.getPropertyValue('--text-2');ctx.fillText('FOR TWO',x,y+11);ctx.restore();}};
function renderBudgetChart(){
  if(typeof Chart==='undefined'||budgetChart)return;
  budgetChart=new Chart(document.getElementById('ch-budget'),{
    type:'doughnut',
    data:{labels:CATS.map(function(c){return CATLABEL[c];}),
      datasets:[{data:CATS.map(function(c){return catSums[c];}),
        backgroundColor:CATS.map(function(c){return CATCOLOR[c];}),borderWidth:2,
        borderColor:getComputedStyle(document.documentElement).getPropertyValue('--surface')}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{color:axisColor(),boxWidth:11,font:{size:11.5},padding:9}},
        tooltip:{callbacks:{label:function(c){return c.label+': kr '+fmt(c.parsed)+' (€'+fmt(c.parsed/RATE)+')';}}}}},
    plugins:[donutCenter]
  });
}
function refreshCharts(){
  [driveChart,hikeChart].forEach(function(ch){ if(ch){ ch.options=chartOpts(ch===hikeChart?'m':'h'); ch.update(); }});
  if(budgetChart){ budgetChart.options.plugins.legend.labels.color=axisColor();
    budgetChart.data.datasets[0].borderColor=getComputedStyle(document.documentElement).getPropertyValue('--surface'); budgetChart.update(); }
}

/* ---- CHECKLIST ---- */
function updateChecks(){
  var items=document.querySelectorAll('#checklist input'); var done=0;
  items.forEach(function(c){ c.closest('li').classList.toggle('done',c.checked); if(c.checked)done++; });
  var pct=items.length?Math.round(done/items.length*100):0;
  document.getElementById('pkfill').style.width=pct+'%';
  document.getElementById('pkcount').textContent=done+' of '+items.length+' packed';
  try{var s=[];items.forEach(function(c){s.push(c.checked?1:0);});localStorage.setItem('acl_pack',JSON.stringify(s));}catch(e){}
}
function resetChecks(){ document.querySelectorAll('#checklist input').forEach(function(c){c.checked=false;}); updateChecks(); }
function initChecklist(){
  var items=document.querySelectorAll('#checklist input');
  try{var s=JSON.parse(localStorage.getItem('acl_pack')||'[]');items.forEach(function(c,i){if(s[i])c.checked=true;});}catch(e){}
  items.forEach(function(c){c.addEventListener('change',updateChecks);});
  document.querySelectorAll('#checklist li[data-h]').forEach(function(li){
    var h=document.createElement('div'); h.className='subh'; h.textContent=li.getAttribute('data-h');
    li.parentNode.insertBefore(h,li);
  });
  updateChecks();
}

/* ---- per-day logistics strip ---- */
function injectPlans(){
  var cards=document.querySelectorAll('#page-route .dcard');
  function planIcon(k){k=k.toLowerCase();if(k.indexOf('sleep')===0)return '🛏 ';if(k.indexOf('fuel')===0)return '⛽ ';if(k.indexOf('shop')===0)return '🛒 ';if(k.indexOf('bbq')===0)return '🔥 ';if(k.indexOf('book')===0)return '📌 ';if(k.indexOf('coffee')===0)return '☕ ';return '';}
  var PLANS=TRIP.plans||[];
  cards.forEach(function(c,i){
    var p=PLANS[i]; if(!p) return;
    var wrap=document.createElement('div'); wrap.className='plan';
    p.forEach(function(pair){
      var pl=document.createElement('div'); pl.className=(pair[0].toLowerCase().indexOf('coffee')===0?'pl plwide':'pl');
      pl.innerHTML='<span class="pk">'+planIcon(pair[0])+pair[0]+'</span><span class="pv">'+pair[1]+'</span>';
      wrap.appendChild(pl);
    });
    (c.querySelector('.dbody')||c).appendChild(wrap);
  });
}

/* ---- REAL MAP (Leaflet) + offline SVG fallback ---- */
var STOPS={};
(TRIP.stops||[]).forEach(function(s){STOPS[s.key]={ll:[s.lat,s.lng],t:(s.label||'').split(' · ')[0],sub:s.label,type:s.type,note:s.note};});
function showFallback(){var m=document.getElementById('map'),fb=document.getElementById('mapfallback');if(m)m.style.display='none';if(fb)fb.style.display='block';}
function initMap(){
  var mapEl=document.getElementById('map'); if(!mapEl) return;
  if(typeof L==='undefined'){ showFallback(); return; }
  var map=L.map('map',{scrollWheelZoom:false});
  var tilesOK=false;
  var tiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/'+(document.documentElement.classList.contains('dark')?'dark_all':'light_all')+'/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd',maxZoom:18,attribution:'© OpenStreetMap · © CARTO'});
  window._acltiles=tiles;
  tiles.on('tileload',function(){tilesOK=true;});
  tiles.addTo(map);
  function line(coords,color,dash,w,op){return L.polyline(coords,{color:color,weight:w||4,opacity:op||0.9,dashArray:dash||null,lineJoin:'round',lineCap:'round'}).addTo(map);}
  var mp=TRIP.map||{};
  (mp.ferryLines||[]).forEach(function(f){ line(f,TEAL,'4 8',3,0.9); });
  var driveStyle={color:AMBER,weight:4,opacity:0.95,lineJoin:'round',lineCap:'round'};
  var retStyle={color:AMBER,weight:3,opacity:0.6,dashArray:'2 9',lineJoin:'round',lineCap:'round'};
  var OSRM=['https://router.project-osrm.org/route/v1/driving/','https://routing.openstreetmap.de/routed-car/route/v1/driving/'];
  function snap(leg){
    var style=leg.style==='return'?retStyle:driveStyle;
    var layer=line(leg.pts,style.color,style.dashArray,style.weight,style.opacity);
    var path=leg.pts.map(function(p){return p[1]+','+p[0];}).join(';');
    var hi=0;
    function attempt(){
      if(hi>=OSRM.length) return;
      fetch(OSRM[hi]+path+'?overview=full&geometries=geojson').then(function(r){return r.json();}).then(function(d){
        if(d&&d.code==='Ok'&&d.routes&&d.routes[0]){
          var c=d.routes[0].geometry.coordinates.map(function(x){return [x[1],x[0]];});
          map.removeLayer(layer); L.polyline(c,style).addTo(map);
        } else { hi++; attempt(); }
      }).catch(function(){ hi++; attempt(); });
    }
    attempt();
  }
  (mp.driveLegs||[]).forEach(snap);
  var markers={}, group=[];
  (TRIP.stops||[]).forEach(function(s,i){
    var camp=s.type==='camp', endpoint=i===0;
    var mk=L.circleMarker([s.lat,s.lng],{radius:endpoint?9:7,color:endpoint?AMBER:(camp?'#b06a1f':TEAL),weight:endpoint?3:2,fillColor:camp?AMBER:'#ffffff',fillOpacity:1}).addTo(map);
    mk.bindPopup('<span class="pday">'+(s.label||'')+'</span><br><b>'+((s.label||'').split(' · ')[0])+'</b><span class="pnote">'+(s.note||'')+'</span>');
    markers[s.key]=mk; group.push([s.lat,s.lng]);
  });
  if(group.length)map.fitBounds(group,{padding:[34,34]});
  window._aclmap=map; window._aclmarkers=markers;
  setTimeout(function(){ if(!tilesOK){ try{map.remove();}catch(e){} showFallback(); } },4000);
}
function initRailClicks(){
  document.querySelectorAll('#rail .railrow').forEach(function(r){
    r.addEventListener('click',function(){
      document.querySelectorAll('#rail .railrow').forEach(function(x){x.classList.remove('active');});
      r.classList.add('active');
      var id=r.getAttribute('data-stop'), mk=window._aclmarkers&&window._aclmarkers[id];
      if(mk&&window._aclmap){ window._aclmap.flyTo(mk.getLatLng(),9,{duration:.7}); setTimeout(function(){mk.openPopup();},650); }
    });
  });
}
