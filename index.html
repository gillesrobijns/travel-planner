<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trips</title>
<style>
  :root{--bg:#fbf9f5;--surface:#fff;--border:#eae4da;--text:#2a2521;--text-2:#7a7268;--accent:#c96a2b;--accent-l:#f6e6d6}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:40px 20px}
  .wrap{max-width:880px;margin:0 auto}
  h1{font-size:30px;margin:0 0 4px;letter-spacing:-.02em}
  .sub{color:var(--text-2);margin:0 0 26px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
  .trip{display:block;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 18px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:transform .12s,box-shadow .12s,border-color .12s}
  .trip:hover{transform:translateY(-2px);box-shadow:0 12px 28px -10px rgba(0,0,0,.18);border-color:var(--accent)}
  .tt{font-size:18px;font-weight:700;letter-spacing:-.01em}
  .ts{color:var(--text-2);font-size:13.5px;margin-top:3px}
  .tm{color:var(--text-2);font-size:12.5px;margin-top:10px}
  .tgo{color:var(--accent);font-weight:600;font-size:13px;margin-top:12px}
  .empty{color:var(--text-2);background:var(--surface);border:1px dashed var(--border);border-radius:14px;padding:26px;text-align:center}
  footer{color:var(--text-2);font-size:12px;margin-top:28px}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Trips</h1>
    <p class="sub">1 trip · tap a card to open its dashboard</p>
    <div class="grid">
      <a class="trip" href="trips/lofoten-2026/dashboard.html">
        <div class="tt">Lofoten Roadtrip 2026</div>
        <div class="ts">Lofoten Roadtrip · Tromsø → Lofoten · 1–14 Aug 2026</div>
        <div class="tm">13 nights · 13 days · 6 hikes · ~€6,705</div>
        <div class="tgo">Open dashboard →</div>
      </a>
    </div>
    <footer>Generated 2026-07-13 · rebuild with <code>node build-index.js</code></footer>
  </div>
</body>
</html>
